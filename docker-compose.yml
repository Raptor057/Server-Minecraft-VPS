name: ${COMPOSE_PROJECT_NAME:-minecraft-crafty}

services:
  crafty:
    image: ${CRAFTY_IMAGE:-registry.gitlab.com/crafty-controller/crafty-4}:${CRAFTY_TAG:-latest}
    container_name: ${CRAFTY_CONTAINER_NAME:-crafty_container}
    restart: unless-stopped

    environment:
      TZ: ${TZ:-America/Chicago}

    ports:
      - "${CRAFTY_PANEL_PORT:-8443}:8443"
      - "${CRAFTY_DYNMAP_PORT:-8123}:8123"
      - "${CRAFTY_BEDROCK_PORT:-19132}:19132/udp"
      - "${CRAFTY_JAVA_PORT_RANGE:-25500-25600}:25500-25600"

    volumes:
      - ${CRAFTY_BACKUPS_PATH:-./crafty/backups}:/crafty/backups
      - ${CRAFTY_LOGS_PATH:-./crafty/logs}:/crafty/logs
      - ${CRAFTY_SERVERS_PATH:-./crafty/servers}:/crafty/servers
      - ${CRAFTY_CONFIG_PATH:-./crafty/config}:/crafty/app/config
      - ${CRAFTY_IMPORT_PATH:-./crafty/import}:/crafty/import

